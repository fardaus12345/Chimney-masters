<!-- @dsCard group="Spacing" viewport="700x170" subtitle="Card elevation + red CTA glow" name="Shadows" -->
<!DOCTYPE html>
<html><head><link rel="stylesheet" href="../styles.css">
<style>body{margin:0;padding:24px;box-sizing:border-box;display:flex;gap:24px;align-items:center;justify-content:center;height:170px;background:var(--cm-gray-50)}
.s{background:#fff;border-radius:var(--radius-lg);width:130px;height:100px;display:flex;align-items:center;justify-content:center;font:600 11px var(--font-body);color:var(--text-muted)}</style></head>
<body>
<div class="s" style="box-shadow:var(--shadow-sm)">sm · resting</div>
<div class="s" style="box-shadow:var(--shadow-md)">md · cards</div>
<div class="s" style="box-shadow:var(--shadow-lg)">lg · hover / popover</div>
<div class="s" style="box-shadow:var(--shadow-cta);background:var(--cm-red-600);color:#fff">cta · red glow</div>
</body></html>
