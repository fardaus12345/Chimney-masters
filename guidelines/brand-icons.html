<!-- @dsCard group="Brand" viewport="700x150" subtitle="Lucide outline icons, 2px stroke — red or charcoal" name="Iconography" -->
<!DOCTYPE html>
<html><head><link rel="stylesheet" href="../styles.css">
<script src="https://unpkg.com/lucide@0.469.0/dist/umd/lucide.min.js"></script>
<style>body{margin:0;padding:16px;box-sizing:border-box;display:flex;gap:28px;align-items:center;justify-content:center;height:150px}
.ic{display:flex;flex-direction:column;align-items:center;gap:8px;font:500 10px var(--font-body);color:var(--text-muted)}
.ic svg{width:32px;height:32px}</style></head>
<body>
<div class="ic" style="color:var(--cm-red-600)"><i data-lucide="flame"></i><span style="color:var(--cm-gray-500)">flame</span></div>
<div class="ic" style="color:var(--cm-charcoal-800)"><i data-lucide="home"></i><span style="color:var(--cm-gray-500)">home</span></div>
<div class="ic" style="color:var(--cm-charcoal-800)"><i data-lucide="shield-check"></i><span style="color:var(--cm-gray-500)">shield-check</span></div>
<div class="ic" style="color:var(--cm-charcoal-800)"><i data-lucide="wrench"></i><span style="color:var(--cm-gray-500)">wrench</span></div>
<div class="ic" style="color:var(--cm-red-600)"><i data-lucide="phone"></i><span style="color:var(--cm-gray-500)">phone</span></div>
<div class="ic" style="color:var(--cm-charcoal-800)"><i data-lucide="calendar-check"></i><span style="color:var(--cm-gray-500)">calendar-check</span></div>
<div class="ic" style="color:var(--cm-amber-500)"><i data-lucide="star"></i><span style="color:var(--cm-gray-500)">star</span></div>
<div class="ic" style="color:var(--cm-charcoal-800)"><i data-lucide="map-pin"></i><span style="color:var(--cm-gray-500)">map-pin</span></div>
<script>lucide.createIcons();</script>
</body></html>
