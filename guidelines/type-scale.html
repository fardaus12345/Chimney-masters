<!-- @dsCard group="Type" viewport="700x180" subtitle="Full scale, hero to caption" name="Type Scale" -->
<!DOCTYPE html>
<html><head><link rel="stylesheet" href="../styles.css">
<style>body{margin:0;padding:16px 24px;box-sizing:border-box;display:flex;flex-direction:column;gap:2px;justify-content:center}
.row{display:flex;align-items:baseline;gap:16px}
.row code{font-size:10px;color:var(--text-muted);width:90px;flex:none}</style></head>
<body>
<div class="row"><code>hero 56/800</code><span style="font:800 34px/1.1 var(--font-display);color:var(--text-heading)">Hero</span></div>
<div class="row"><code>h1 44/700</code><span style="font:700 28px/1.15 var(--font-display);color:var(--text-heading)">Heading 1</span></div>
<div class="row"><code>h2 32/700</code><span style="font:700 22px/1.2 var(--font-display);color:var(--text-heading)">Heading 2</span></div>
<div class="row"><code>h3 24/700</code><span style="font:700 17px/1.3 var(--font-display);color:var(--text-heading)">Heading 3</span></div>
<div class="row"><code>body 16/400</code><span style="font:400 14px/1.5 var(--font-body);color:var(--text-body)">Body text set in Inter Regular</span></div>
</body></html>
