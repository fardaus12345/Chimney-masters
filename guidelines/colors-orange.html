<!-- @dsCard group="Colors" viewport="700x150" subtitle="Client-directed warm section backgrounds" name="Orange (Section Wash)" -->
<!DOCTYPE html>
<html><head><link rel="stylesheet" href="../styles.css">
<style>body{margin:0;display:flex;gap:8px;padding:16px;box-sizing:border-box}
.sw{flex:1;border-radius:8px;padding:10px;display:flex;flex-direction:column;justify-content:flex-end;height:118px;box-sizing:border-box}
.sw span{font:600 11px var(--font-body)}.sw code{font-size:10px;opacity:.8}</style></head>
<body>
<div class="sw" style="background:var(--cm-orange-600);color:#fff"><span>orange-600</span><code>#EA580C</code></div>
<div class="sw" style="background:var(--cm-orange-400);color:#fff"><span>orange-400</span><code>#FB923C</code></div>
<div class="sw" style="background:var(--cm-orange-100);color:var(--cm-charcoal-900)"><span>orange-100 ★ section bg</span><code>#FFE3CC</code></div>
<div class="sw" style="background:var(--cm-orange-50);color:var(--cm-charcoal-900);border:1px solid var(--border-default)"><span>orange-50 ★ alt bg</span><code>#FFF4EA</code></div>
</body></html>
