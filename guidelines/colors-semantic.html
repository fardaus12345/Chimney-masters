<!-- @dsCard group="Colors" viewport="700x140" subtitle="Success, warning, danger + amber rating accent" name="Semantic & Status" -->
<!DOCTYPE html>
<html><head><link rel="stylesheet" href="../styles.css">
<style>body{margin:0;display:flex;gap:12px;padding:16px;box-sizing:border-box;align-items:center}
.chip{flex:1;border-radius:8px;padding:12px;height:108px;box-sizing:border-box;display:flex;flex-direction:column;gap:6px;justify-content:center}
.dot{width:20px;height:20px;border-radius:50%}
.chip b{font:600 12px var(--font-body)}.chip code{font-size:10px}</style></head>
<body>
<div class="chip" style="background:var(--cm-success-bg);color:var(--cm-success)"><div class="dot" style="background:var(--cm-success)"></div><b>Success</b><code>#16A34A</code></div>
<div class="chip" style="background:var(--cm-warning-bg);color:var(--cm-warning)"><div class="dot" style="background:var(--cm-warning)"></div><b>Warning</b><code>#B45309</code></div>
<div class="chip" style="background:var(--cm-danger-bg);color:var(--cm-danger)"><div class="dot" style="background:var(--cm-danger)"></div><b>Danger</b><code>#B91C1C</code></div>
<div class="chip" style="background:var(--cm-amber-100);color:var(--cm-amber-500)"><div class="dot" style="background:var(--cm-amber-500)"></div><b>Rating amber</b><code>#D97706</code></div>
</body></html>
