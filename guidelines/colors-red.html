<!-- @dsCard group="Colors" viewport="700x150" subtitle="Brick red accent scale" name="Brand Red" -->
<!DOCTYPE html>
<html><head><link rel="stylesheet" href="../styles.css">
<style>body{margin:0;display:flex;gap:8px;padding:16px;box-sizing:border-box}
.sw{flex:1;border-radius:8px;padding:10px;display:flex;flex-direction:column;justify-content:flex-end;height:118px;box-sizing:border-box}
.sw span{font:600 11px var(--font-body)}.sw code{font-size:10px;opacity:.8}</style></head>
<body>
<div class="sw" style="background:var(--cm-red-800);color:#fff"><span>red-800</span><code>#6F0E13</code></div>
<div class="sw" style="background:var(--cm-red-700);color:#fff"><span>red-700 hover</span><code>#AA0F1A</code></div>
<div class="sw" style="background:var(--cm-red-600);color:#fff;outline:2px solid var(--cm-charcoal-900);outline-offset:2px"><span>red-600 ★</span><code>#E30C1D</code></div>
<div class="sw" style="background:var(--cm-red-100);color:var(--cm-red-700)"><span>red-100</span><code>#FDE3E5</code></div>
<div class="sw" style="background:var(--cm-red-50);color:var(--cm-red-700);border:1px solid var(--border-default)"><span>red-50</span><code>#FEF2F3</code></div>
</body></html>
