<!-- @dsCard group="Spacing" viewport="700x150" subtitle="4px base scale" name="Spacing Tokens" -->
<!DOCTYPE html>
<html><head><link rel="stylesheet" href="../styles.css">
<style>body{margin:0;padding:16px 24px;box-sizing:border-box;display:flex;gap:20px;align-items:flex-end;height:150px}
.col{display:flex;flex-direction:column;align-items:center;gap:6px}
.bar{width:28px;background:var(--cm-red-600);border-radius:3px}
.col code{font-size:10px;color:var(--text-muted)}</style></head>
<body>
<div class="col"><div class="bar" style="height:4px"></div><code>1·4</code></div>
<div class="col"><div class="bar" style="height:8px"></div><code>2·8</code></div>
<div class="col"><div class="bar" style="height:12px"></div><code>3·12</code></div>
<div class="col"><div class="bar" style="height:16px"></div><code>4·16</code></div>
<div class="col"><div class="bar" style="height:24px"></div><code>5·24</code></div>
<div class="col"><div class="bar" style="height:32px"></div><code>6·32</code></div>
<div class="col"><div class="bar" style="height:48px"></div><code>7·48</code></div>
<div class="col"><div class="bar" style="height:64px"></div><code>8·64</code></div>
<div class="col"><div class="bar" style="height:90px"></div><code>9·96</code></div>
</body></html>
