<!DOCTYPE html>
<html><head><link rel="stylesheet" href="../styles.css">
<style>body{margin:0;padding:16px;box-sizing:border-box;display:flex;gap:16px;align-items:center;justify-content:center;height:160px}
.r{background:var(--cm-gray-100);border:1px solid var(--border-strong);width:110px;height:90px;display:flex;align-items:center;justify-content:center;font:600 11px var(--font-body);color:var(--text-muted)}</style></head>
<body>
<div class="r" style="border-radius:var(--radius-sm)">sm 4 · tags</div>
<div class="r" style="border-radius:var(--radius-md)">md 8 · buttons</div>
<div class="r" style="border-radius:var(--radius-lg)">lg 12 · cards</div>
<div class="r" style="border-radius:var(--radius-xl)">xl 16 · dialogs</div>
<div class="r" style="border-radius:var(--radius-full);width:130px;height:48px">pill · phone CTA</div>
</body></html>
