<!-- @dsCard group="Colors" viewport="700x150" subtitle="Charcoal text + neutral grays" name="Charcoal & Neutrals" -->
<!DOCTYPE html>
<html><head><link rel="stylesheet" href="../styles.css">
<style>body{margin:0;display:flex;gap:6px;padding:16px;box-sizing:border-box}
.sw{flex:1;border-radius:8px;padding:8px;display:flex;flex-direction:column;justify-content:flex-end;height:118px;box-sizing:border-box}
.sw span{font:600 10px var(--font-body)}.sw code{font-size:9px;opacity:.8}</style></head>
<body>
<div class="sw" style="background:var(--cm-charcoal-900);color:#fff"><span>900 ★</span><code>#020302</code></div>
<div class="sw" style="background:var(--cm-charcoal-800);color:#fff"><span>800</span><code>#14181D</code></div>
<div class="sw" style="background:var(--cm-charcoal-700);color:#fff"><span>700</span><code>#374151</code></div>
<div class="sw" style="background:var(--cm-gray-600);color:#fff"><span>600 body</span><code>#4B5563</code></div>
<div class="sw" style="background:var(--cm-gray-500);color:#fff"><span>500 ★</span><code>#6B7280</code></div>
<div class="sw" style="background:var(--cm-gray-300);color:var(--cm-charcoal-800)"><span>300</span><code>#D1D5DB</code></div>
<div class="sw" style="background:var(--cm-gray-200);color:var(--cm-charcoal-800)"><span>200</span><code>#E5E7EB</code></div>
<div class="sw" style="background:var(--cm-gray-100);color:var(--cm-charcoal-800)"><span>100</span><code>#F3F4F6</code></div>
<div class="sw" style="background:var(--cm-gray-50);color:var(--cm-charcoal-800);border:1px solid var(--border-default)"><span>50</span><code>#F8FAFC</code></div>
</body></html>
